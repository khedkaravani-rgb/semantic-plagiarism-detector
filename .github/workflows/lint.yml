name: Lint

on:
  pull_request:
    branches: [main, master]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pylint
      - name: Run Ruff
        run: ruff check .
      - name: Run Pylint for Streamlit anti-patterns
        env:
          PYTHONPATH: .
        run: pylint --load-plugins=pylint_plugins.streamlit_lint --disable=all --enable=streamlit-global-mutation app/ src/
