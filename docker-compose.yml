version: "3.9"

services:
  nginx:
    image: nginx:alpine
    ports:
      - "8501:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped

  app:
    build: .
    expose:
      - "8501"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - REDIS_HOST=redis
      - APP_BASE_URL=http://localhost:8501
    volumes:
      - ./.streamlit:/app/.streamlit
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
