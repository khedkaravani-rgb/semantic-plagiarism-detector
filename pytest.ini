[pytest]
# ── Path Resolution ───────────────────────────────────────────────────────────
pythonpath = .

# ── Test Discovery ────────────────────────────────────────────────────────────
testpaths = tests

# ── Output & Reporting Options ────────────────────────────────────────────────
addopts = -v --tb=short --strict-markers --cov=src --cov=app --cov-report=xml --cov-report=term-missing

# ── Custom Markers ────────────────────────────────────────────────────────────
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests that require live database or network access
    unit: marks fast, isolated unit tests

# ── Warning Filters ───────────────────────────────────────────────────────────
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
    ignore::FutureWarning
